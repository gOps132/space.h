services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: spaceh
      POSTGRES_USER: spaceh
      POSTGRES_PASSWORD: spaceh
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      SPACEH_DB_URL: jdbc:postgresql://postgres:5432/spaceh
      SPACEH_DB_USERNAME: spaceh
      SPACEH_DB_PASSWORD: spaceh
    ports:
      - "8080:8080"
    depends_on:
      - postgres

  frontend:
    image: node:20-alpine
    working_dir: /workspace/frontend
    command: sh -c "npm ci && npm run dev -- --host 0.0.0.0"
    volumes:
      - ./:/workspace
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres-data:
