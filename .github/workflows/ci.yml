name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

  backend:
    name: Backend PHP Test
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_DATABASE: spaceh
          MYSQL_USER: spaceh
          MYSQL_PASSWORD: spaceh
          MYSQL_ROOT_PASSWORD: spaceh-root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -pspaceh-root"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20
    env:
      SPACEH_DB_HOST: 127.0.0.1
      SPACEH_DB_PORT: 3306
      SPACEH_DB_NAME: spaceh
      SPACEH_DB_USERNAME: spaceh
      SPACEH_DB_PASSWORD: spaceh
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: pdo_mysql

      - name: Lint backend
        run: find . -name '*.php' -print0 | xargs -0 -n1 php -l

      - name: Load backend schema
        run: mysql -h 127.0.0.1 -u "$SPACEH_DB_USERNAME" -p"$SPACEH_DB_PASSWORD" "$SPACEH_DB_NAME" < schema/mysql.sql

      - name: Test backend
        run: php tests/run.php
