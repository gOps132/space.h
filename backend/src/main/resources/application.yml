spring:
  application:
    name: spaceh-backend
  datasource:
    url: ${SPACEH_DB_URL:jdbc:postgresql://localhost:5432/spaceh}
    username: ${SPACEH_DB_USERNAME:spaceh}
    password: ${SPACEH_DB_PASSWORD:spaceh}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  jackson:
    time-zone: UTC

server:
  port: ${SPACEH_BACKEND_PORT:8080}

spaceh:
  security:
    jwt:
      secret: ${SPACEH_JWT_SECRET:spaceh-development-secret-spaceh-development-secret}
      expiration-minutes: ${SPACEH_JWT_EXPIRATION_MINUTES:120}
